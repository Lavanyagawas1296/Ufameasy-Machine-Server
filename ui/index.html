<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFAMeasy Machine Parameters</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --panel: #242424;
      --panel-soft: #2d2d2d;
      --border: #3a3a3a;
      --text: #f2f2f2;
      --muted: #a8a8a8;
      --green: #27c46a;
      --red: #ef4444;
      --yellow: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      background: #202020;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .connection {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.45);
    }

    .dot.connected {
      background: var(--green);
      box-shadow: 0 0 10px rgba(39, 196, 106, 0.45);
    }

    main {
      width: min(1280px, calc(100vw - 32px));
      margin: 24px auto;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .search {
      width: min(420px, 100%);
      padding: 11px 13px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }

    .search:focus {
      border-color: #6b7280;
    }

    .summary {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .table-wrap {
      max-height: calc(100vh - 300px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #1a1a1a;
      color: #d9d9d9;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    td {
      color: #ececec;
      font-size: 14px;
    }

    .domain-row th {
      position: static;
      padding: 9px 12px;
      background: var(--panel-soft);
      color: #ffffff;
      font-size: 13px;
      text-transform: none;
      border-top: 1px solid #464646;
    }

    .param-id,
    .value,
    .slice {
      font-family: Consolas, "Courier New", monospace;
    }

    .value {
      transition: background-color 0.9s ease;
    }

    .value.flash {
      background: var(--yellow);
      color: #151515;
      transition: background-color 0s;
    }

    .empty {
      display: none;
      padding: 42px 16px;
      color: var(--muted);
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .empty.visible {
      display: block;
    }

    .events-panel {
      height: 200px;
      overflow-y: auto;
      margin-top: 16px;
      padding: 14px;
      color: #d7d7d7;
      background: #222222;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: Consolas, "Courier New", monospace;
    }

    .events-panel h2 {
      margin: 0 0 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .events-list {
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
    }

    .events-list li {
      color: #cfcfcf;
    }

    .table-wrap.hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .topbar,
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status-area {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }

      .search {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">UFAMeasy Machine Parameters</div>
    <div class="status-area">
      <div class="connection" aria-live="polite">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div id="lastUpdated">Last updated: --:--:--</div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="searchInput" class="search" type="search" placeholder="Search by Param ID or Field" autocomplete="off">
      <div id="summary" class="summary">0 parameters</div>
    </div>

    <div id="emptyState" class="empty">No data yet</div>

    <div id="tableWrap" class="table-wrap hidden">
      <table>
        <thead>
          <tr>
            <th>Param ID</th>
            <th>Field</th>
            <th>Value</th>
            <th>Unit</th>
            <th>Domain</th>
            <th>Slice</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="events-panel">
      <h2>Recent Activity</h2>
      <ul id="eventsList" class="events-list"></ul>
    </div>
  </main>

  <script>
    const tableBody = document.getElementById("tableBody");
    const tableWrap = document.getElementById("tableWrap");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const summary = document.getElementById("summary");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const lastUpdated = document.getElementById("lastUpdated");
    const eventsList = document.getElementById("eventsList");

    const rowsByKey = new Map();
    let socket = null;
    let reconnectTimer = null;

    function rowKey(paramId, sliceIdx) {
      return `${sliceIdx}::${paramId}`;
    }

    function normalizeParam(paramId, param, sliceIdx) {
      const data = param || {};

      return {
        param_id: String(data.param_id || paramId || ""),
        field: String(data.field || ""),
        value: data.value == null ? "" : String(data.value),
        unit: String(data.unit || ""),
        domain: String(data.domain || "Uncategorized"),
        slice_idx: String(data.slice_idx || sliceIdx || "")
      };
    }

    function flattenSnapshots(snapshots) {
      const rows = [];

      Object.entries(snapshots || {}).forEach(([sliceIdx, params]) => {
        Object.entries(params || {}).forEach(([paramId, param]) => {
          rows.push(normalizeParam(paramId, param, sliceIdx));
        });
      });

      return rows;
    }

    function sortRows(rows) {
      return rows.sort((a, b) => {
        const domainCompare = a.domain.localeCompare(b.domain);
        if (domainCompare !== 0) return domainCompare;

        const paramCompare = a.param_id.localeCompare(b.param_id, undefined, { numeric: true });
        if (paramCompare !== 0) return paramCompare;

        return a.slice_idx.localeCompare(b.slice_idx, undefined, { numeric: true });
      });
    }

    function createCell(text, className) {
      const cell = document.createElement("td");
      cell.textContent = text;
      if (className) cell.className = className;
      return cell;
    }

    function createDataRow(row) {
      const tr = document.createElement("tr");
      tr.id = `row-${row.slice_idx}-${row.param_id}`;
      tr.dataset.key = rowKey(row.param_id, row.slice_idx);
      tr.dataset.paramId = row.param_id.toLowerCase();
      tr.dataset.field = row.field.toLowerCase();
      tr.dataset.domain = row.domain;

      tr.appendChild(createCell(row.param_id, "param-id"));
      tr.appendChild(createCell(row.field, "field"));
      tr.appendChild(createCell(row.value, "value"));
      tr.appendChild(createCell(row.unit, "unit"));
      tr.appendChild(createCell(row.domain, "domain"));
      tr.appendChild(createCell(row.slice_idx, "slice"));

      return tr;
    }

    function createDomainRow(domain) {
      const tr = document.createElement("tr");
      tr.className = "domain-row";
      tr.dataset.domainHeader = domain;

      const th = document.createElement("th");
      th.colSpan = 6;
      th.textContent = domain;
      tr.appendChild(th);

      return tr;
    }

    function renderTable(rows) {
      tableBody.textContent = "";
      rowsByKey.clear();

      const sortedRows = sortRows(rows);
      let currentDomain = null;

      sortedRows.forEach((row) => {
        if (row.domain !== currentDomain) {
          currentDomain = row.domain;
          tableBody.appendChild(createDomainRow(currentDomain));
        }

        const tr = createDataRow(row);
        rowsByKey.set(rowKey(row.param_id, row.slice_idx), tr);
        tableBody.appendChild(tr);
      });

      updateVisibility();
    }

    function syncSummary() {
      const visibleRows = Array.from(tableBody.querySelectorAll("tr[data-key]")).filter((row) => row.style.display !== "none").length;
      const label = visibleRows === 1 ? "parameter" : "parameters";
      summary.textContent = `${visibleRows} ${label}`;
    }

    function updateEmptyState() {
      const totalRows = rowsByKey.size;
      const hasVisibleRows = Array.from(rowsByKey.values()).some((row) => row.style.display !== "none");

      emptyState.classList.toggle("visible", totalRows === 0 || !hasVisibleRows);
      emptyState.textContent = totalRows === 0 ? "No data yet" : "No matching data";
      tableWrap.classList.toggle("hidden", totalRows === 0);
    }

    function updateDomainHeaders() {
      const headers = Array.from(tableBody.querySelectorAll("tr[data-domain-header]"));

      headers.forEach((header) => {
        const domain = header.dataset.domainHeader;
        const hasVisibleRows = Array.from(rowsByKey.values())
          .filter((row) => row.dataset.domain === domain)
          .some((row) => row.style.display !== "none");
        header.style.display = hasVisibleRows ? "" : "none";
      });
    }

    function updateVisibility() {
      const query = searchInput.value.trim().toLowerCase();

      rowsByKey.forEach((row) => {
        const matches = !query || row.dataset.paramId.startsWith(query) || row.dataset.field.includes(query);
        row.style.display = matches ? "" : "none";
      });

      updateDomainHeaders();
      updateEmptyState();
      syncSummary();
    }

    function flashCell(cell) {
      cell.classList.remove("flash");
      void cell.offsetWidth;
      cell.classList.add("flash");
      window.setTimeout(() => cell.classList.remove("flash"), 500);
    }

    function removeNoDataPlaceholder() {
      const placeholderRow = tableBody.querySelector(".no-data-placeholder");
      if (placeholderRow) {
        placeholderRow.remove();
      }

      emptyState.classList.remove("visible");
      tableWrap.classList.remove("hidden");
    }

    function updateCell(rowElement, selector, value) {
      const cell = rowElement.querySelector(selector);
      if (cell.textContent !== value) {
        cell.textContent = value;
        flashCell(cell);
      }
    }

    function compareRows(a, b) {
      const domainCompare = a.domain.localeCompare(b.domain);
      if (domainCompare !== 0) return domainCompare;

      const paramCompare = a.param_id.localeCompare(b.param_id, undefined, { numeric: true });
      if (paramCompare !== 0) return paramCompare;

      return a.slice_idx.localeCompare(b.slice_idx, undefined, { numeric: true });
    }

    function getRowData(tr) {
      return {
        param_id: tr.children[0].textContent,
        field: tr.children[1].textContent,
        value: tr.children[2].textContent,
        unit: tr.children[3].textContent,
        domain: tr.children[4].textContent,
        slice_idx: tr.children[5].textContent
      };
    }

    function ensureDomainHeader(domain) {
      let header = Array.from(tableBody.querySelectorAll("tr[data-domain-header]"))
        .find((item) => item.dataset.domainHeader === domain);
      if (header) return header;

      header = createDomainRow(domain);
      const headers = Array.from(tableBody.querySelectorAll("tr[data-domain-header]"));
      const nextHeader = headers.find((item) => item.dataset.domainHeader.localeCompare(domain) > 0);

      if (nextHeader) {
        tableBody.insertBefore(header, nextHeader);
      } else {
        tableBody.appendChild(header);
      }

      return header;
    }

    function insertNewRow(row) {
      const tr = createDataRow(row);
      const header = ensureDomainHeader(row.domain);
      let cursor = header.nextElementSibling;

      while (cursor && !cursor.dataset.domainHeader) {
        if (compareRows(row, getRowData(cursor)) < 0) {
          tableBody.insertBefore(tr, cursor);
          rowsByKey.set(rowKey(row.param_id, row.slice_idx), tr);
          return tr;
        }

        cursor = cursor.nextElementSibling;
      }

      tableBody.insertBefore(tr, cursor);
      rowsByKey.set(rowKey(row.param_id, row.slice_idx), tr);
      return tr;
    }

    function renderSnapshot(sliceIdx, data) {
      removeNoDataPlaceholder();

      Object.entries(data || {}).forEach(([paramId, param]) => {
        const row = normalizeParam(paramId, param, sliceIdx);
        const id = `row-${row.slice_idx}-${row.param_id}`;

        if (!document.getElementById(id)) {
          const inserted = insertNewRow(row);
          flashCell(inserted.querySelector(".value"));
        }
      });

      updateVisibility();
    }

    function insertOrUpdateRow(row) {
      const key = rowKey(row.param_id, row.slice_idx);
      const existing = rowsByKey.get(key);

      if (existing) {
        if (existing.dataset.domain !== row.domain) {
          existing.remove();
          rowsByKey.delete(key);
          const inserted = insertNewRow(row);
          Array.from(inserted.children).forEach(flashCell);
          updateVisibility();
          return;
        }

        updateCell(existing, ".field", row.field);
        updateCell(existing, ".value", row.value);
        updateCell(existing, ".unit", row.unit);
        updateCell(existing, ".domain", row.domain);
        updateCell(existing, ".slice", row.slice_idx);
        existing.dataset.paramId = row.param_id.toLowerCase();
        existing.dataset.field = row.field.toLowerCase();
        existing.dataset.domain = row.domain;
        updateVisibility();
        return;
      }

      const inserted = insertNewRow(row);
      flashCell(inserted.querySelector(".value"));
      updateVisibility();
    }

    async function fetchSnapshots() {
      try {
        const response = await fetch("/snapshots", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const snapshots = await response.json();
        renderTable(flattenSnapshots(snapshots));
      } catch (error) {
        console.error("Failed to fetch snapshots", error);
      }
    }

    function setConnectionStatus(connected) {
      statusDot.classList.toggle("connected", connected);
      statusText.textContent = connected ? "Connected" : "Disconnected";
    }

    function updateLastUpdated() {
      lastUpdated.textContent = `Last updated: ${new Date().toLocaleTimeString("en-US", { hour12: false })}`;
    }

    function updateStatus(text) {
      emptyState.textContent = text;
      emptyState.classList.add("visible");
      tableWrap.classList.add("hidden");
      syncSummary();
    }

    function addActivityEvent(event) {
      const details = event.details || {};
      const item = document.createElement("li");
      item.textContent = `[${event.timestamp}] ${event.type} - slice ${details.slice_idx}, ${details.param_count} params`;
      eventsList.prepend(item);

      while (eventsList.children.length > 10) {
        eventsList.lastElementChild.remove();
      }
    }

    function addSnapshotActivity(sliceIdx, data) {
      addActivityEvent({
        type: "snapshot_received",
        timestamp: new Date().toLocaleTimeString("en-US", { hour12: false }),
        details: {
          slice_idx: sliceIdx,
          param_count: Object.keys(data || {}).length
        }
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;

      reconnectTimer = window.setTimeout(() => {
        reconnectTimer = null;
        connectWebSocket();
      }, 3000);
    }

    function connectWebSocket() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        return;
      }

      socket = new WebSocket(`ws://${window.location.host}/ws`);

      socket.onopen = async () => {
        setConnectionStatus(true);
        await fetchSnapshots();
      };

      socket.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);

          if (message.type === "session_reset") {
            tableBody.innerHTML = "";
            rowsByKey.clear();
            eventsList.innerHTML = "";
            updateStatus("Session reset — waiting for new data...");
            return;
          }

          if (message.type === "snapshot") {
            const sliceIdx = String(message.slice_idx || "");
            let needsInsert = false;

            Object.entries(message.data || {}).forEach(([paramId, param]) => {
              const row = normalizeParam(paramId, param, sliceIdx);
              const existingRow = document.getElementById(`row-${row.slice_idx}-${row.param_id}`);

              if (existingRow) {
                updateCell(existingRow, ".value", row.value);
              } else {
                needsInsert = true;
              }
            });

            if (needsInsert) {
              renderSnapshot(sliceIdx, message.data);
            } else {
              updateVisibility();
            }

            updateLastUpdated();
            addSnapshotActivity(sliceIdx, message.data);
          }
        } catch (error) {
          console.error("Invalid WebSocket message", error);
        }
      };

      socket.onerror = () => {
        setConnectionStatus(false);
      };

      socket.onclose = () => {
        setConnectionStatus(false);
        scheduleReconnect();
      };
    }

    searchInput.addEventListener("input", updateVisibility);

    fetchSnapshots();
    connectWebSocket();
  </script>
</body>
</html>
